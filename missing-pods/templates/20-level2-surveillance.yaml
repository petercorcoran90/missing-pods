{{- /*
The surveillance camera. Ships as a Deployment scaled to 0 so the noisy
`noise` container isn't burning a CPU loop while nobody's watching. The
player brings it online, then scopes logs to the `camera` container.
Two containers teaches `kubectl logs -c <name>`; scaling to 0 afterwards
keeps the cluster quiet.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: surveillance-cam
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "case.labels" . | nindent 4 }}
    role: surveillance
    case.level: "2"
  annotations:
    {{- if .Values.difficulty.hints }}
    case.hint: "Powered down (Deployment at 0). Bring it up: `kubectl scale deployment/surveillance-cam --replicas=1`. Two containers - scope logs to one: `kubectl logs deploy/surveillance-cam -c camera --tail=20`. Power it down after with --replicas=0."
    {{- end }}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: surveillance-cam
  template:
    metadata:
      labels:
        {{- include "case.labels" . | nindent 8 }}
        app: surveillance-cam
        role: surveillance
    spec:
      containers:
        # Noise container - emits garbage, NOT the clue. This is deliberate
        # so the player learns to scope logs to a specific container. It only
        # spins while the scene is open (Deployment scaled up).
        - name: noise
          image: {{ .Values.images.busybox | quote }}
          command:
            - /bin/sh
            - -c
            - |
              i=0
              while true; do
                i=$((i+1))
                echo "[static] $(date -u +%H:%M:%S) frame ${i}: ......zzzzz......"
                sleep 1
              done
          {{- include "case.resources" . | nindent 10 }}
        # The camera container holds the clue. Emits it on a steady loop so
        # `--tail` always catches it.
        - name: camera
          image: {{ .Values.images.busybox | quote }}
          command:
            - /bin/sh
            - -c
            - |
              # Print the clue immediately so even `kubectl logs --tail=1` works.
              while true; do
                echo "=============================================="
                echo "  CAMERA-3 night feed - lobby cam"
                echo "=============================================="
                echo "I saw the intruder slip into the filing room."
                echo "They were carrying a folder marked FILE-B."
                echo ""
                echo "Passphrase: {{ .Values.answers.level2 }}"
                echo ""
                echo "Next lead: the records are in a ConfigMap called"
                echo "  filing-cabinet. Config doesn't run - there's"
                echo "  nothing to power on, just read it. Most files"
                echo "  are dead ends. One isn't."
                echo "Power me down once you've logged the passphrase."
                echo "=============================================="
                sleep 10
              done
          {{- include "case.resources" . | nindent 10 }}
