{{- /*
The finale workforce. One Deployment per entry in .Values.workers.
All ship sealed at 0 replicas - they cost nothing to run and you
never have to start them. The tell is in the labels/manifest, not in
a running pod: `kubectl get deploy -l role=worker --show-labels`,
`helm get values <release>` and `helm get manifest <release>` all
reveal one whose `team` does not match the others. That is the
intruder. (A player can scale the crew up for a theatrical line-up,
but it is not required to crack the case.)
*/ -}}
{{- range $w := .Values.workers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $w.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "case.labels" $ | nindent 4 }}
    role: worker
    team: {{ $w.team }}
    worker: {{ $w.name }}
  annotations:
    case.note: {{ $w.note | quote }}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: {{ $w.name }}
  template:
    metadata:
      labels:
        {{- include "case.labels" $ | nindent 8 }}
        app: {{ $w.name }}
        role: worker
        team: {{ $w.team }}
        worker: {{ $w.name }}
    spec:
      containers:
        - name: worker
          image: {{ $.Values.images.busybox | quote }}
          env:
            - name: WORKER_NAME
              value: {{ $w.name | quote }}
            - name: WORKER_TEAM
              value: {{ $w.team | quote }}
          command:
            - /bin/sh
            - -c
            - |
              echo "[${WORKER_NAME}] reporting in - team=${WORKER_TEAM}"
              exec sleep infinity
          {{- include "case.resources" $ | nindent 10 }}
{{- end }}
