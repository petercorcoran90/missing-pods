apiVersion: v1
kind: ConfigMap
metadata:
  name: case-file-text
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "case.labels" . | nindent 4 }}
    role: case-file
data:
  case-file.txt: |
{{ .Values.theme.briefing | indent 4 }}
    -------------------------------------------------------------
    PRECINCT HQ - THE DESK
    -------------------------------------------------------------
    Each level's clue carries a passphrase ("Passphrase for
    Precinct HQ: XXX"). Hand them in to the desk so the case
    file stays current.

    The desk runs as a ClusterIP Service inside this namespace,
    so it only answers from inside the cluster. You've got a
    `detective-terminal` pod purpose-built for talking to
    in-cluster services - use it. The desk talks HTTP GET.

    Endpoints:
        /                              case status + progress bar
        /submit?clue=<passphrase>      log a level's evidence
        /hint?level=<1..7>             graduated hints (1=mild..3=spoiler)
        /accuse?name=<suspect>         close the case (the finale)

    Service address inside the cluster:
        {{ include "case.validatorHost" . }}:{{ .Values.validator.port }}

    Stuck on a level for more than a few minutes? Ask the desk
    for a hint. That's what it's there for.

    -------------------------------------------------------------
    HOW THE PRECINCT RUNS ITS SCENES
    -------------------------------------------------------------
    Budget's tight and the cluster's small, so we keep every
    crime scene SEALED until you're working it. Each scene is a
    Deployment parked at zero replicas - nothing running, nothing
    burning resources. When you reach a scene, bring it online
    (scale it to one replica), take what it gives you, then seal
    it again before you move on (scale it back to zero). Leave
    scenes running and the cluster gets heavy fast - testers on
    small machines will thank you.

    Three things stay on the whole case and you never touch them:
    this case file, the `detective-terminal` pod, and the Precinct
    HQ desk. Everything else, you open and close yourself.

    Not sure how to bring a scene up or down? The desk will walk
    you through it: /hint?level=<n>.

    -------------------------------------------------------------
    YOUR FIRST LEAD - LEVEL 1: THE FIRST WITNESS
    -------------------------------------------------------------
    We've got a witness, but they're not in the building - we
    sent them home to keep the lights low. They're a Deployment
    tagged `role=witness`. Bring them in for questioning (one
    replica), then take their statement: witnesses only talk on
    the record, so check their paperwork (annotations), not their
    mouth (logs). Let them go again when you're done.
    -------------------------------------------------------------
---
apiVersion: v1
kind: Pod
metadata:
  name: case-file
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "case.labels" . | nindent 4 }}
    role: case-file
  annotations:
    case.level: "0"
    case.hint: "Run: kubectl logs case-file -n {{ .Release.Namespace }}"
spec:
  restartPolicy: Always
  containers:
    - name: briefing
      image: {{ .Values.images.busybox | quote }}
      command:
        - /bin/sh
        - -c
        - |
          cat /case/case-file.txt
          echo ""
          echo "(briefing delivered - this pod will idle so you can re-read it)"
          # Idle forever so the pod stays Running and logs remain available.
          exec sleep infinity
      volumeMounts:
        - name: case
          mountPath: /case
      {{- include "case.resources" . | nindent 6 }}
  volumes:
    - name: case
      configMap:
        name: case-file-text
