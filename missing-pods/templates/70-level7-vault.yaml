{{- /*
An emptyDir volume populated by an initContainer that writes
/evidence/manifest.txt. Teaches volumes, volumeMounts, mountPath, and
exec'ing into a pod to read a file from its filesystem. (PVCs work
identically; we use emptyDir so the chart has no StorageClass
dependency and resets cleanly on reinstall.)
*/ -}}
{{- $manifest := printf "=============================================================\n  EVIDENCE MANIFEST - vault sub-basement\n=============================================================\nFinal physical evidence recovered. Inventory:\n  - 1x customer-records.csv      (sealed)\n  - 1x ledger-bypass.script      (signed: see below)\n  - 1x burner phone              (factory reset)\n\nForensics on the bypass script points one way: the script was\nbuilt and shipped to the cluster by a HELM RELEASE.\n\nPassphrase: %s\n\nFinal move, detective: audit the workloads this release\ndeployed. One of them does not match the rest. That's your\nculprit. Hand their name to the desk - the desk knows what\nto do with /accuse.\n=============================================================\n" .Values.answers.level7 -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-manifest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "case.labels" . | nindent 4 }}
    role: vault-manifest
data:
  manifest.txt: |
{{ $manifest | indent 4 }}
---
apiVersion: v1
kind: Pod
metadata:
  name: vault-keeper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "case.labels" . | nindent 4 }}
    role: vault
    case.level: "7"
  annotations:
    {{- if .Values.difficulty.hints }}
    case.hint: "`kubectl exec vault-keeper -- cat /evidence/manifest.txt`. The mount path is /evidence."
    {{- end }}
spec:
  restartPolicy: Always
  initContainers:
    - name: seed-evidence
      image: {{ .Values.images.busybox | quote }}
      command:
        - /bin/sh
        - -c
        - |
          # Copy the manifest from the configMap volume into the persistent
          # emptyDir mount. The player will see the file at /evidence.
          cp /seed/manifest.txt /evidence/manifest.txt
          chmod 0444 /evidence/manifest.txt
      volumeMounts:
        - name: seed
          mountPath: /seed
        - name: evidence
          mountPath: /evidence
      {{- include "case.resources" . | nindent 6 }}
  containers:
    - name: keeper
      image: {{ .Values.images.busybox | quote }}
      command: ["/bin/sh", "-c", "exec sleep infinity"]
      volumeMounts:
        - name: evidence
          mountPath: /evidence
          readOnly: true
      {{- include "case.resources" . | nindent 6 }}
  volumes:
    - name: seed
      configMap:
        name: vault-manifest
    - name: evidence
      emptyDir: {}
