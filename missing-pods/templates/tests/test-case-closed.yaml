{{- if .Values.validator.enabled }}
{{- /*
`helm test <release>` health-check. Confirms Precinct HQ is up. Does NOT
solve the case for the player - it just pings /healthz.
*/ -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-precinct-ping
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "case.labels" . | nindent 4 }}
    role: helm-test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: ping
      image: {{ .Values.images.curl | quote }}
      command:
        - sh
        - -c
        - |
          set -eu
          url="http://{{ include "case.validatorHost" . }}:{{ .Values.validator.port }}/healthz"
          echo "GET ${url}"
          curl --max-time 5 --silent --show-error --fail "${url}"
      {{- include "case.resources" . | nindent 6 }}
{{- end }}
